<section class="blog">
  <header class="blog__header">
    <h1 class="blog__title">Blog</h1>
    <p class="blog__subtitle">Sistema de Blogging en Angular</p>
  </header>

  <div class="blog__grid">
    <!-- LISTADO -->
    <main class="panel">
      <h2 class="panel__title">Listado de noticias</h2>

      <div class="news-list">
  @for (n of noticias; track n.titulo) {
    <article class="news">
      <img class="news__img" [src]="n.imagen" [alt]="n.titulo" />

      <h3 class="news__title">{{ n.titulo }}</h3>
      <p class="news__meta">{{ n.autor }} · {{ n.fecha }}</p>

      <p class="news__text">
        {{ n.texto }}
      </p>

      <div class="news__tags">
        @for (t of n.tags; track t) {
          <span class="tag">{{ t }}</span>
        }
      </div>
    </article>
  }
</div>
    </main>

    <!-- FORMULARIO -->
    <aside class="panel panel--form">
      <h2 class="panel__title">Nueva noticia</h2>

      <!-- (Solo maqueta; luego haremos validación y submit) -->
      <form class="form" autocomplete="off">
        <label class="field">
          <span class="field__label">Título</span>
          <input class="field__input" type="text" placeholder="Ej: Therian: identidad y comunidad" />
          <small class="field__hint">Obligatorio</small>
        </label>

        <label class="field">
          <span class="field__label">Autor</span>
          <input class="field__input" type="text" placeholder="Ej: Suso" />
          <small class="field__hint">Obligatorio</small>
        </label>

        <label class="field">
          <span class="field__label">Fecha</span>
          <input class="field__input" type="date" />
          <small class="field__hint">Obligatorio</small>
        </label>

       <label class="field">
        <span class="field__label">Imagen (URL)</span>
        <input class="field__input" type="url"
            placeholder="https://ejemplo.com/imagen.jpg"/>
        <small class="field__hint">Obligatorio</small>
        </label> 

        <label class="field">
          <span class="field__label">Contenido</span>
          <textarea class="field__input field__input--textarea" rows="5" placeholder="Escribe aquí la noticia..."></textarea>
          <small class="field__hint">Obligatorio</small>
        </label>

        <label class="field">
          <span class="field__label">Tags (separados por coma)</span>
          <input class="field__input" type="text" placeholder="therian, identidad, comunidad" />
          <small class="field__hint">Opcional</small>
        </label>

        <div class="form__actions">
          <button class="btn" type="button">Publicar</button>
          <button class="btn btn--ghost" type="button">Limpiar</button>
        </div>
      </form>
    </aside>
  </div>
</section>
